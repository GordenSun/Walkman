name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 自动扫描 music/ 生成播放列表
        run: node tools/build-playlist.mjs

      - name: 组装站点
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '_site' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'tools' \
            --exclude 'shots' \
            --exclude '.DS_Store' \
            ./ _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
